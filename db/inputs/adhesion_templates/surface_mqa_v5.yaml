# SE/NCM Adhesion v5 — Crystalline Slab + Surface-only MQA
# Preserves bulk structure and vacancies

calculator:
  model: "uma-s-1p2"  # UMA model (fairchem)
  device: "cuda"  # V100 GPU

# Cell construction
cell:
  SE:
    repeat: [2, 2, 1]       # SE 2x2x1 supercell
    orthogonalize: true      # Remove xy components from a3 for rhombo cells
  NCM:
    material: "LiNiO2"
    spacegroup: "R-3m"
    repeat: [5, 5, 1]       # NCM 5x5x1 slab
  stacking_gap_A: 2.5

# Lattice matching
lattice_match:
  Li6:
    SE_cell: "prim_2x2x1"   # 52 atoms (comp1) or 208 atoms (comp2)
    NCM_cell: "5x5x1"       # 300 atoms
    strain_pct: 3.3
  Li5.4:
    SE_cell: "2x2x1"        # 248 atoms
    NCM_cell: "5x5x1"       # 300 atoms
    strain_pct: 1.1

# Surface-only MQA protocol
mqa:
  steps:
    - name: "surface_softening"
      temperature_K: 800
      duration_ps: 2.0
      notes: "Surface atoms rearrange, bulk preserved. Safe because lattice matched."
    - name: "quench"
      temperature_K: 300
      duration_ps: 2.0
    - name: "li_anneal"
      temperature_K: 500
      duration_ps: 3.0
      notes: "Li sublattice optimization. Vacancy preserved."
    - name: "cool"
      temperature_K: 100
      duration_ps: 2.0
  final_relax:
    optimizer: "FIRE"
    fmax: 0.01

# Wad calculation
adhesion:
  method: "isolated_slab"
  # Wad = (E_SE_isolated + E_NCM_isolated - E_interface) / A
  # NOT separation-relax (causes strain release → negative Wad)

# z-cut sampling
statistics:
  n_z_cuts: 5
  z_shifts: [0.0, 0.2, 0.4, 0.6, 0.8]  # Fractional z positions
  # Li6: similar Wad → small variance
  # Li5.4: vacancy exposure dependent → large variance = evidence for chemical anchor

# Previous methods (deprecated):
# v1: Random amorphous start → inconsistent
# v2: 3000K melt-quench → destroys vacancy
# v3: 800K melt, 5x1x1 NCM → PBC artifact (mismatch 20%)
# v4: 1500K melt → destroys framework
# v5: THIS — crystalline slab + matched lattice + surface MQA ✓
